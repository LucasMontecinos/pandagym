<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FECHIPO — Athlete Database</title>
<meta name="description" content="Federación Chilena de Powerlifting — Base de datos de atletas e historial competitivo">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#64748b;--accent:#f59e0b;--accent2:#ef4444;--blue:#3b82f6;--green:#22c55e;--purple:#a855f7}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.container{max-width:920px;margin:0 auto;padding:16px 20px}
input,select,button{font-family:inherit}

/* Header */
.header{text-align:center;padding:24px 0 20px;position:relative}
.header::after{content:'';display:block;width:60px;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));margin:12px auto 0;border-radius:2px}
.header h1{font-family:'Oswald',sans-serif;font-size:clamp(22px,5vw,30px);font-weight:700;letter-spacing:3px;text-transform:uppercase}
.header h1 span{color:var(--accent)}
.header p{color:var(--muted);font-size:13px;margin-top:6px}

/* Tabs */
.tabs{display:flex;gap:8px;margin-bottom:18px}
.tab{padding:9px 22px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all .2s}
.tab.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.tab:hover:not(.active){border-color:var(--muted)}

/* Search bar */
.filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.filters input{flex:1;min-width:200px;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
.filters input:focus{border-color:var(--accent)}
.filters select{padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;outline:none;cursor:pointer;max-width:220px}
.count{color:var(--muted);font-size:12px;margin-bottom:10px}

/* Athlete list */
.athlete-list{display:flex;flex-direction:column;gap:6px}
.athlete-row{background:var(--card);border-radius:12px;padding:12px 16px;cursor:pointer;border:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:border-color .2s,transform .15s}
.athlete-row:hover{border-color:var(--accent);transform:translateX(3px)}
.athlete-left{display:flex;align-items:center;gap:12px;overflow:hidden}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.avatar.active{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.avatar.inactive{background:var(--border)}
.athlete-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.athlete-meta{font-size:11px;color:var(--muted)}
.athlete-meta .code{color:var(--accent);font-weight:600}
.athlete-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.comp-count{background:rgba(245,158,11,.15);color:var(--accent);padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600}
.chevron{color:#475569;font-size:18px}

/* Profile view */
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;margin-bottom:20px;display:flex;align-items:center;gap:6px;transition:border-color .2s}
.back-btn:hover{border-color:var(--accent);color:var(--text)}
.profile-card{background:linear-gradient(135deg,var(--card) 0%,var(--bg) 100%);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:20px}
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.profile-avatar{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;font-family:'Oswald',sans-serif;flex-shrink:0}
.profile-name{font-size:clamp(18px,4vw,24px);font-weight:700;font-family:'Oswald',sans-serif;letter-spacing:.5px}
.profile-code{color:var(--accent);font-weight:600;font-size:14px;font-family:'Oswald',sans-serif;letter-spacing:1px}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.profile-field{background:var(--bg);border-radius:10px;padding:10px 14px}
.profile-field .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.profile-field .value{font-size:14px;font-weight:600}

/* History */
.history-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px}
.history-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.history-title h2{font-size:16px;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase}
.history-badge{background:var(--accent);color:var(--bg);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700}
.comp-entry{background:var(--bg);border-radius:12px;padding:16px;margin-bottom:10px;border-left:3px solid var(--border);transition:transform .15s}
.comp-entry:hover{transform:translateX(3px)}
.comp-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-right:6px;margin-bottom:6px}
.comp-details{margin-top:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:12px}
.comp-details .dl{color:var(--muted)}
.comp-details .dv{font-weight:600}
.empty-state{color:var(--muted);text-align:center;padding:40px 20px;font-size:14px}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:12px;padding:20px;text-align:center;border:1px solid var(--border)}
.stat-number{font-size:clamp(24px,5vw,34px);font-weight:700;font-family:'Oswald',sans-serif}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
.ranking-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ranking-card{background:var(--card);border-radius:12px;padding:20px;border:1px solid var(--border)}
.ranking-card h3{margin:0 0 12px;font-size:14px;font-family:'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase}
.ranking-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(30,41,59,.4);cursor:pointer;transition:opacity .15s}
.ranking-row:hover{opacity:.8}
.ranking-pos{font-weight:700;font-size:12px;width:22px}
.ranking-name{font-size:13px}
.ranking-val{padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{text-align:center;padding:30px 0;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:40px}

/* Responsive */
@media(max-width:640px){
  .filters{flex-direction:column}
  .filters select{max-width:none}
  .profile-grid{grid-template-columns:1fr}
  .comp-details{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr}
  .ranking-grid{grid-template-columns:1fr}
  .athlete-row{padding:10px 12px}
}
</style>
</head>
<body>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Cargando base de datos...</p>
  </div>
</div>

<script>
const COMP_COLORS = {
  "Campeonato Nacional FECHIPO 2026": { bg:"#fef3c7", border:"#f59e0b", text:"#92400e", tag:"Nacional 2026" },
  "Campeonato Nacional FECHIPO 2025": { bg:"#dbeafe", border:"#3b82f6", text:"#1e40af", tag:"Nacional 2025" },
  "Regional Centro Norte 2025":      { bg:"#dcfce7", border:"#22c55e", text:"#166534", tag:"Reg. Centro Norte 2025" },
  "Regional Sur Austral 2025":       { bg:"#f3e8ff", border:"#a855f7", text:"#6b21a8", tag:"Reg. Sur Austral 2025" },
  "Zonal Centro Clausura 2024":      { bg:"#ffe4e6", border:"#f43f5e", text:"#9f1239", tag:"Zonal Centro 2024" },
};

let ATHLETES = [];
let state = { view: "list", search: "", filterClub: "", filterComp: "", selected: null, page: 0 };

function initials(name) {
  return name.split(" ").map(w => w[0]).filter(Boolean).slice(0,2).join("").toUpperCase();
}

function getClubs() {
  return [...new Set(ATHLETES.map(a => a.club).filter(Boolean))].sort();
}
function getComps() {
  return [...new Set(ATHLETES.flatMap(a => a.competencias.map(c => c.evento)))].sort();
}
function getFiltered() {
  const s = state.search.toLowerCase();
  return ATHLETES.filter(a => {
    if (s && !a.nombre.toLowerCase().includes(s) && !a.codigo.toLowerCase().includes(s) && !a.rut.includes(s)) return false;
    if (state.filterClub && a.club !== state.filterClub) return false;
    if (state.filterComp && !a.competencias.some(c => c.evento === state.filterComp)) return false;
    return true;
  });
}

function compTag(evento) {
  const c = COMP_COLORS[evento] || { bg:"#f1f5f9", border:"#94a3b8", text:"#334155", tag: evento };
  return `<span class="comp-tag" style="background:${c.bg};border:1.5px solid ${c.border};color:${c.text}">${c.tag}</span>`;
}

function renderProfile(a) {
  const fields = [["RUT", a.rut], ["Fecha Nac.", a.fechaNac], ["Club", a.club], ["Debut FECHIPO", a.debut]];
  const comps = a.competencias.length === 0
    ? '<div class="empty-state">Sin competencias registradas aún</div>'
    : a.competencias.map(c => {
        const color = (COMP_COLORS[c.evento] || {}).border || "#64748b";
        return `<div class="comp-entry" style="border-left-color:${color}">
          ${compTag(c.evento)}
          <div class="comp-details">
            <div><span class="dl">División: </span><span class="dv">${c.division || "—"}</span></div>
            <div><span class="dl">Categoría: </span><span class="dv">${c.categoria || "—"}</span></div>
            <div><span class="dl">Modalidad: </span><span class="dv">${c.modalidad || "—"}</span></div>
          </div>
        </div>`;
      }).join("");

  return `
    <button class="back-btn" onclick="goBack()">← Volver</button>
    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-avatar">${initials(a.nombre)}</div>
        <div>
          <div class="profile-name">${a.nombre}</div>
          <div class="profile-code">${a.codigo}</div>
        </div>
      </div>
      <div class="profile-grid">
        ${fields.map(([l,v]) => `<div class="profile-field"><div class="label">${l}</div><div class="value">${v || "—"}</div></div>`).join("")}
      </div>
    </div>
    <div class="history-card">
      <div class="history-title">
        <h2>Historial de Competencias</h2>
        <span class="history-badge">${a.competencias.length}</span>
      </div>
      ${comps}
    </div>`;
}

function renderStats() {
  const withComp = ATHLETES.filter(a => a.competencias.length > 0).length;
  const totalPart = ATHLETES.reduce((s, a) => s + a.competencias.length, 0);
  const topAthletes = [...ATHLETES].filter(a => a.competencias.length > 0)
    .sort((a, b) => b.competencias.length - a.competencias.length).slice(0, 10);
  const clubCount = {};
  ATHLETES.forEach(a => { if (a.club) clubCount[a.club] = (clubCount[a.club] || 0) + 1; });
  const topClubs = Object.entries(clubCount).sort((a, b) => b[1] - a[1]).slice(0, 10);

  return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number" style="color:var(--blue)">${ATHLETES.length}</div><div class="stat-label">Total Atletas</div></div>
      <div class="stat-card"><div class="stat-number" style="color:var(--green)">${withComp}</div><div class="stat-label">Con Competencias</div></div>
      <div class="stat-card"><div class="stat-number" style="color:var(--accent)">${totalPart}</div><div class="stat-label">Participaciones</div></div>
    </div>
    <div class="ranking-grid">
      <div class="ranking-card">
        <h3 style="color:var(--accent)">Top Atletas</h3>
        ${topAthletes.map((a, i) => `<div class="ranking-row" onclick="selectAthlete('${a.codigo}')">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="ranking-pos" style="color:var(--accent)">${i+1}.</span>
            <span class="ranking-name">${a.nombre}</span>
          </div>
          <span class="ranking-val" style="background:rgba(245,158,11,.15);color:var(--accent)">${a.competencias.length}</span>
        </div>`).join("")}
      </div>
      <div class="ranking-card">
        <h3 style="color:var(--blue)">Top Clubes</h3>
        ${topClubs.map(([club, count], i) => `<div class="ranking-row" style="cursor:default">
          <div style="display:flex;align-items:center;gap:8px">
            <span class="ranking-pos" style="color:var(--blue)">${i+1}.</span>
            <span class="ranking-name">${club}</span>
          </div>
          <span class="ranking-val" style="background:rgba(59,130,246,.15);color:var(--blue)">${count}</span>
        </div>`).join("")}
      </div>
    </div>`;
}

function renderList() {
  const filtered = getFiltered();
  const PER_PAGE = 50;
  const shown = filtered.slice(0, (state.page + 1) * PER_PAGE);
  const clubs = getClubs();
  const comps = getComps();

  return `
    <div class="filters">
      <input type="text" placeholder="Buscar por nombre, código o RUT..." value="${state.search}" oninput="updateSearch(this.value)">
      <select onchange="updateClub(this.value)">
        <option value="">Todos los clubes</option>
        ${clubs.map(c => `<option value="${c}" ${state.filterClub===c?'selected':''}>${c}</option>`).join("")}
      </select>
      <select onchange="updateComp(this.value)">
        <option value="">Todas las competencias</option>
        ${comps.map(c => `<option value="${c}" ${state.filterComp===c?'selected':''}>${c}</option>`).join("")}
      </select>
    </div>
    <div class="count">${filtered.length} atletas encontrados</div>
    <div class="athlete-list">
      ${shown.map(a => `<div class="athlete-row" onclick="selectAthlete('${a.codigo.replace(/'/g,"\\'")}')">
        <div class="athlete-left">
          <div class="avatar ${a.competencias.length>0?'active':'inactive'}">${initials(a.nombre)}</div>
          <div style="overflow:hidden">
            <div class="athlete-name">${a.nombre}</div>
            <div class="athlete-meta"><span class="code">${a.codigo}</span>${a.club?' · '+a.club:''}</div>
          </div>
        </div>
        <div class="athlete-right">
          ${a.competencias.length>0?`<span class="comp-count">${a.competencias.length} comp.</span>`:''}
          <span class="chevron">›</span>
        </div>
      </div>`).join("")}
    </div>
    ${filtered.length > shown.length ? `<div style="text-align:center;padding:20px"><button class="tab" onclick="loadMore()" style="border-color:var(--accent);color:var(--accent)">Cargar más (${filtered.length - shown.length} restantes)</button></div>` : ''}`;
}

function render() {
  const app = document.getElementById("app");
  let content = `
    <div class="header">
      <h1><span>FECHIPO</span> Athlete Database</h1>
      <p>Federación Chilena de Powerlifting — Base de datos oficial</p>
    </div>`;

  if (state.selected) {
    content += renderProfile(state.selected);
  } else {
    content += `<div class="tabs">
      <button class="tab ${state.view==='list'?'active':''}" onclick="switchView('list')">Atletas</button>
      <button class="tab ${state.view==='stats'?'active':''}" onclick="switchView('stats')">Estadísticas</button>
    </div>`;
    content += state.view === "stats" ? renderStats() : renderList();
  }

  content += `<div class="footer">FECHIPO — Federación Chilena de Powerlifting · Afiliada a IPF & WADA<br>Datos actualizados · Desarrollado para FECHIPO</div>`;
  app.innerHTML = content;

  if (!state.selected && state.view === "list") {
    const input = app.querySelector('.filters input');
    if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
  }
}

// Event handlers
function switchView(v) { state.view = v; state.page = 0; render(); window.scrollTo(0,0); }
function updateSearch(v) { state.search = v; state.page = 0; render(); }
function updateClub(v) { state.filterClub = v; state.page = 0; render(); }
function updateComp(v) { state.filterComp = v; state.page = 0; render(); }
function selectAthlete(codigo) {
  state.selected = ATHLETES.find(a => a.codigo === codigo);
  render();
  window.scrollTo(0,0);
}
function goBack() { state.selected = null; render(); }
function loadMore() { state.page++; render(); }

// Load data
fetch("data.json")
  .then(r => r.json())
  .then(data => { ATHLETES = data; render(); })
  .catch(err => {
    document.getElementById("app").innerHTML = `
      <div class="loading" style="gap:12px">
        <p style="color:var(--accent);font-size:16px;font-weight:600">Error cargando datos</p>
        <p style="color:var(--muted);font-size:13px;max-width:400px;text-align:center">
          Asegúrate de que el archivo <code style="background:var(--card);padding:2px 6px;border-radius:4px">data.json</code> 
          esté en la misma carpeta que este archivo HTML.
        </p>
        <p style="color:var(--muted);font-size:11px">${err.message}</p>
      </div>`;
  });
</script>
</body>
</html>
